<!DOCTYPE html>
<html>

<head>
    <title>SABER-AI Student Stress Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SABER-AI</h1>
<h2>AI Student Burnout Detection System</h2>

<div class="container">

<h3>Stress Prediction</h3>

<label>Study Hours</label>
<input type="number" id="study">

<label>Sleep Hours</label>
<input type="number" id="sleep">

<label>Deadlines</label>
<input type="number" id="deadlines">

<label>Typing Speed (WPM)</label>
<input type="number" id="typing">

<button onclick="predictStress()">Predict Stress</button>

<div id="stressResult"></div>

</div>

<div class="container">

<h3>Voice Emotion Detection</h3>

<input type="file" id="voiceFile">

<button onclick="uploadVoice()">Detect Emotion</button>

<div id="voiceResult"></div>

</div>

<script src="script.js"></script>

</body>

</html>
